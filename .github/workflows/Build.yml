name: Build with Nuitka on Windows

on:
  workflow_dispatch:          # 手动触发

jobs:
  build:
    runs-on: windows-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          if (Test-Path requirements.txt) {
            pip install -r requirements.txt
          } else {
            pip install nuitka winrt ordered-set zstandard
          }

      - name: Build with Nuitka (using your exact command)
        run: |
          nuitka --standalone --onefile --lto=yes --jobs=4 `
                 --windows-icon-from-ico=logo.ico `
                 --include-package=winrt `
                 --remove-output --assume-yes-for-downloads `
                 main.py

      - name: Upload artifact (the generated .exe)
        uses: actions/upload-artifact@v4
        with:
          name: building-exe
          path: main.exe